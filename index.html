<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音频分割工具</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f2;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --border: #d2d2d7;
  --primary: #007aff;
  --primary-hover: #0062cc;
  --primary-light: #e8f0fe;
  --success: #34c759;
  --danger: #ff3b30;
  --danger-hover: #d62d20;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
}
[data-theme=dark] {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --surface2: #3a3a3c;
  --text: #f5f5f7;
  --text2: #a1a1a6;
  --border: #48484a;
  --primary: #0a84ff;
  --primary-hover: #409cff;
  --primary-light: #1c3a5e;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
  transition: background .3s, color .3s;
}

.container { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; }
.theme-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 50%;
  width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; transition: .2s; color: var(--text);
}
.theme-btn:hover { background: var(--border); }

.card {
  background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);
  transition: background .3s, border-color .3s;
}

/* Upload */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 48px 24px;
  text-align: center; cursor: pointer; transition: .25s; background: var(--surface2);
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--primary); background: var(--primary-light);
}
.upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
.upload-zone .text { font-size: 1.1rem; font-weight: 500; margin-bottom: 6px; }
.upload-zone .hint { font-size: .85rem; color: var(--text2); }
.upload-zone input[type=file] { display: none; }

.file-info { display: none; margin-top: 16px; padding: 12px 16px; background: var(--surface2);
  border-radius: var(--radius-sm); align-items: center; gap: 12px; }
.file-info.show { display: flex; }
.file-info .name { flex: 1; font-weight: 500; word-break: break-all; }
.file-info .size, .file-info .duration { font-size: .85rem; color: var(--text2); white-space: nowrap; }
.file-info .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer;
  font-size: 1.2rem; padding: 4px; line-height: 1; }

/* Parameters */
.params-grid { display: grid; gap: 20px; }
.param { }
.param-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.param-header label { font-weight: 500; font-size: .9rem; }
.param-header .value { font-size: .85rem; color: var(--primary); font-weight: 600;
  background: var(--primary-light); padding: 2px 10px; border-radius: 20px; }
.param input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none; height: 6px;
  background: var(--border); border-radius: 3px; outline: none;
  transition: background .2s;
}
.param input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary); cursor: pointer; border: 3px solid var(--surface);
  box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: .15s;
}
.param input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
.param input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%; background: var(--primary);
  cursor: pointer; border: 3px solid var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.param-desc { font-size: .78rem; color: var(--text2); margin-top: 4px; }

/* Controls */
.controls { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  padding: 12px 28px; border: none; border-radius: var(--radius-sm); font-size: 1rem;
  font-weight: 600; cursor: pointer; transition: .2s; display: inline-flex;
  align-items: center; gap: 8px;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: var(--danger-hover); transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover:not(:disabled) { background: var(--surface2); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }

/* Progress */
.progress-section { display: none; }
.progress-section.show { display: block; }
.progress-bar-wrap {
  width: 100%; height: 8px; background: var(--border); border-radius: 4px;
  overflow: hidden; margin-bottom: 12px;
}
.progress-bar-fill {
  height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 4px; transition: width .3s;
}
.status-text { font-size: .9rem; color: var(--text2); margin-bottom: 8px; }
.log-box {
  background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 16px;
  max-height: 180px; overflow-y: auto; font-size: .82rem; font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
  line-height: 1.7; color: var(--text2);
}
.log-box .log-entry { opacity: 0; animation: fadeIn .3s forwards; }
@keyframes fadeIn { to { opacity: 1; } }
.log-box .log-warn { color: #ff9500; }
.log-box .log-error { color: var(--danger); }
.log-box .log-success { color: var(--success); }

/* Results */
.results-section { display: none; }
.results-section.show { display: block; }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.results-header h2 { font-size: 1.15rem; }
.results-summary { font-size: .85rem; color: var(--text2); }
.result-card {
  display: flex; gap: 16px; padding: 16px; background: var(--surface2);
  border-radius: var(--radius-sm); margin-bottom: 10px; align-items: center;
  transition: .2s; border: 1px solid transparent;
}
.result-card:hover { border-color: var(--border); }
.result-card .index {
  width: 32px; height: 32px; border-radius: 50%; background: var(--primary);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85rem; flex-shrink: 0;
}
.result-card .info { flex: 1; min-width: 0; }
.result-card .info .name { font-weight: 500; font-size: .9rem; word-break: break-all; }
.result-card .info .duration { font-size: .78rem; color: var(--text2); margin-top: 2px; }
.result-card .actions { display: flex; gap: 6px; flex-shrink: 0; }
.result-card .actions button {
  width: 36px; height: 36px; border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
  transition: .2s; background: var(--surface); border: 1px solid var(--border); color: var(--text);
}
.result-card .actions button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.result-card .actions button.play-btn.playing { background: var(--danger); color: #fff; border-color: var(--danger); }
.result-card .actions button:disabled { opacity: .3; cursor: default; }

/* Waveform canvas */
.result-card .waveform-wrap { width: 120px; height: 36px; flex-shrink: 0; }
.result-card .waveform-wrap canvas { width: 100%; height: 100%; border-radius: 4px; display: block; }

.download-all-wrap { margin-top: 16px; text-align: center; }

/* Hidden */
.hidden { display: none !important; }

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 16px 12px 40px; }
  .card { padding: 16px; }
  .result-card { flex-wrap: wrap; }
  .result-card .waveform-wrap { width: 100%; height: 40px; order: -1; }
  .result-card .actions { width: 100%; justify-content: flex-end; }
  .upload-zone { padding: 32px 16px; }
  .params-grid { gap: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>音频分割</h1>
    <button class="theme-btn" onclick="toggleTheme()" title="切换主题" id="themeBtn">☀️</button>
  </header>

  <!-- Upload -->
  <div class="card">
    <div class="upload-zone" id="uploadZone">
      <div class="icon">🎵</div>
      <div class="text">点击或拖拽音频文件到此处</div>
      <div class="hint">支持 MP3 · WAV · OGG · FLAC · M4A</div>
      <input type="file" id="fileInput" accept="audio/*">
    </div>
    <div class="file-info" id="fileInfo">
      <span class="name" id="fileName"></span>
      <span class="size" id="fileSize"></span>
      <span class="duration" id="fileDuration"></span>
      <button class="remove-btn" onclick="removeFile()" title="移除文件">&times;</button>
    </div>
  </div>

  <!-- Parameters -->
  <div class="card hidden" id="paramsCard">
    <div class="params-grid">
      <div class="param">
        <div class="param-header">
          <label for="minSilence">最小静音长度</label>
          <span class="value" id="minSilenceVal">1000 ms</span>
        </div>
        <input type="range" id="minSilence" min="200" max="3000" value="1000" step="50">
        <div class="param-desc">静音持续超过此长度才视为分割点</div>
      </div>
      <div class="param">
        <div class="param-header">
          <label for="silenceThresh">静音阈值</label>
          <span class="value" id="silenceThreshVal">-40 dB</span>
        </div>
        <input type="range" id="silenceThresh" min="-70" max="-10" value="-40" step="1">
        <div class="param-desc">低于此音量的音频视为静音（数值越低越严格）</div>
      </div>
      <div class="param">
        <div class="param-header">
          <label for="keepSilence">保留静音</label>
          <span class="value" id="keepSilenceVal">200 ms</span>
        </div>
        <input type="range" id="keepSilence" min="0" max="500" value="200" step="10">
        <div class="param-desc">每个片段前后保留的静音量，让过渡更自然</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card hidden" id="controlsCard">
    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="startProcessing()">▶ 开始分割</button>
      <button class="btn btn-danger" id="cancelBtn" onclick="cancelProcessing()" disabled>■ 取消</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card progress-section" id="progressSection">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="status-text" id="statusText">准备就绪</div>
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- Results -->
  <div class="card results-section" id="resultsSection">
    <div class="results-header">
      <div>
        <h2>分割结果</h2>
        <div class="results-summary" id="resultsSummary"></div>
      </div>
    </div>
    <div id="resultsList"></div>
    <div class="download-all-wrap" id="downloadAllWrap">
      <button class="btn btn-success" onclick="downloadAll()">📦 下载全部 (ZIP)</button>
    </div>
  </div>
</div>

<script>
// ========================================================================
//  音频处理引擎
// ========================================================================

function yieldToMain() { return new Promise(r => setTimeout(r, 0)); }

function amplitudeToDB(v) { return 20 * Math.log10(Math.max(v, 1e-15)); }

async function encodeWAV(samples, sampleRate) {
  const len = samples.length;
  const buffer = new ArrayBuffer(44 + len * 2);
  const view = new DataView(buffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + len * 2, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, len * 2, true);

  const batch = 44100;
  let offset = 44;
  for (let i = 0; i < len; i += batch) {
    const end = Math.min(i + batch, len);
    for (let j = i; j < end; j++) {
      const s = Math.max(-1, Math.min(1, samples[j]));
      view.setInt16(offset, s < 0 ? s * 32768 : s * 32767, true);
      offset += 2;
    }
    if (i + batch < len) await yieldToMain();
  }

  return new Blob([buffer], { type: 'audio/wav' });
}

// CRC32 table
const crcTable = new Uint32Array(256);
for (let i = 0; i < 256; i++) {
  let c = i;
  for (let j = 0; j < 8; j++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
  crcTable[i] = c;
}
function crc32(data) {
  let c = 0xffffffff;
  for (let i = 0; i < data.length; i++) c = crcTable[(c ^ data[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}

async function generateZIP(files) {
  const blobParts = [];
  let offset = 0;
  const central = [];

  for (let fi = 0; fi < files.length; fi++) {
    const { name, data } = files[fi];
    const nameBytes = new TextEncoder().encode(name);
    const raw = new Uint8Array(data);
    const crc = crc32(raw);
    const size = raw.length;

    // Local file header
    const hdr = new ArrayBuffer(30 + nameBytes.length);
    const v = new DataView(hdr);
    v.setUint32(0, 0x04034b50, true);
    v.setUint16(4, 20, true);
    v.setUint16(6, 0x0800, true); // flags: UTF-8
    v.setUint16(8, 0, true);      // stored
    v.setUint16(10, 0, true);
    v.setUint16(12, 0, true);
    v.setUint32(14, crc, true);
    v.setUint32(18, size, true);
    v.setUint32(22, size, true);
    v.setUint16(26, nameBytes.length, true);
    v.setUint16(28, 0, true);
    for (let i = 0; i < nameBytes.length; i++) v.setUint8(30 + i, nameBytes[i]);

    blobParts.push(hdr, raw);
    central.push({ nameBytes, crc, size, offset });
    offset += hdr.byteLength + size;

    if (fi % 10 === 0) await yieldToMain();
  }

  // Central directory
  const cdSize = central.reduce((s, e) => s + 46 + e.nameBytes.length, 0);
  const cdBuf = new ArrayBuffer(cdSize);
  const cd = new DataView(cdBuf);
  let cdPos = 0;
  for (const e of central) {
    cd.setUint32(cdPos, 0x02014b50, true);
    cd.setUint16(cdPos + 4, 20, true);
    cd.setUint16(cdPos + 6, 20, true);
    cd.setUint16(cdPos + 8, 0x0800, true); // UTF-8
    cd.setUint16(cdPos + 10, 0, true);
    cd.setUint16(cdPos + 12, 0, true);
    cd.setUint16(cdPos + 14, 0, true);
    cd.setUint32(cdPos + 16, e.crc, true);
    cd.setUint32(cdPos + 20, e.size, true);
    cd.setUint32(cdPos + 24, e.size, true);
    cd.setUint16(cdPos + 28, e.nameBytes.length, true);
    cd.setUint16(cdPos + 30, 0, true);
    cd.setUint16(cdPos + 32, 0, true);
    cd.setUint16(cdPos + 34, 0, true);
    cd.setUint16(cdPos + 36, 0, true);
    cd.setUint32(cdPos + 38, 0, true);
    cd.setUint32(cdPos + 42, e.offset, true);
    for (let i = 0; i < e.nameBytes.length; i++) cd.setUint8(cdPos + 46 + i, e.nameBytes[i]);
    cdPos += 46 + e.nameBytes.length;
  }

  // End of central directory
  const eocd = new ArrayBuffer(22);
  const e = new DataView(eocd);
  e.setUint32(0, 0x06054b50, true);
  e.setUint16(4, 0, true);
  e.setUint16(6, 0, true);
  e.setUint16(8, central.length, true);
  e.setUint16(10, central.length, true);
  e.setUint32(12, cdSize, true);
  e.setUint32(16, offset, true);
  e.setUint16(20, 0, true);

  blobParts.push(cdBuf, eocd);
  return new Blob(blobParts, { type: 'application/zip' });
}

class AudioSegmenter {
  constructor() {
    this.audioContext = null;
    this.audioBuffer = null;
    this.fileName = '';
    this.baseName = '';
    this.cancelled = false;
  }

  async loadFile(file) {
    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    this.fileName = file.name;
    this.baseName = file.name.replace(/\.[^/.]+$/, '');
    const arrayBuffer = await file.arrayBuffer();
    this.audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
  }

  mixToMono() {
    const buf = this.audioBuffer;
    const ch = buf.numberOfChannels;
    const len = buf.length;
    const mono = new Float32Array(len);
    if (ch === 1) {
      mono.set(buf.getChannelData(0));
    } else {
      const chData = [];
      for (let i = 0; i < ch; i++) chData.push(buf.getChannelData(i));
      const invCh = 1 / ch;
      for (let j = 0; j < len; j++) {
        let s = 0;
        for (let i = 0; i < ch; i++) s += chData[i][j];
        mono[j] = s * invCh;
      }
    }
    return mono;
  }

  async analyzeFrames(samples, frameSize, onProgress) {
    const frames = [];
    const total = samples.length;
    const reportEvery = Math.max(1, Math.floor(total / frameSize / 200));
    for (let i = 0; i < total; i += frameSize) {
      const end = Math.min(i + frameSize, total);
      let sumSq = 0;
      for (let j = i; j < end; j++) sumSq += samples[j] * samples[j];
      const rms = Math.sqrt(sumSq / (end - i));
      frames.push({ start: i, end, rms, dB: amplitudeToDB(rms) });
      if ((frames.length % reportEvery) === 0) {
        onProgress(10 + (i / total) * 10);
        await yieldToMain();
      }
    }
    return frames;
  }

  getThreshold(silenceThresh) {
    return Math.pow(10, silenceThresh / 20);
  }

  async findSilenceRuns(frames, frameSize, sampleRate, minSilenceMs, silenceThresh, totalSamples, onProgress) {
    const threshold = this.getThreshold(silenceThresh);
    const minSilenceFrames = Math.ceil(minSilenceMs / 1000 * sampleRate / frameSize);
    const runs = [];
    let inSilence = false;
    let runStart = 0;
    const reportEvery = Math.max(1, Math.floor(frames.length / 20));

    for (let i = 0; i < frames.length; i++) {
      const isSilent = frames[i].rms <= threshold;
      if (isSilent) {
        if (!inSilence) { inSilence = true; runStart = i; }
      } else {
        if (inSilence) {
          if (i - runStart >= minSilenceFrames) {
            runs.push({ startFrame: runStart, endFrame: i,
              startSample: runStart * frameSize,
              endSample: i * frameSize });
          }
          inSilence = false;
        }
      }
      if ((i % reportEvery) === 0) {
        onProgress(20 + (i / frames.length) * 5);
        await yieldToMain();
      }
    }
    if (inSilence && frames.length - runStart >= minSilenceFrames) {
      runs.push({ startFrame: runStart, endFrame: frames.length,
        startSample: runStart * frameSize,
        endSample: totalSamples });
    }

    return runs;
  }

  extractSegments(samples, silenceRuns, keepSilenceSamples) {
    const segments = [];
    let lastEnd = 0;

    for (const run of silenceRuns) {
      const segStart = run.startSample;
      const segEnd = run.endSample;

      if (segStart > lastEnd) {
        const start = Math.max(0, lastEnd - keepSilenceSamples);
        const end = Math.min(samples.length, segStart + keepSilenceSamples);
        if (end > start) segments.push(samples.slice(start, end));
      }

      lastEnd = segEnd;
    }

    if (lastEnd < samples.length) {
      const end = Math.min(samples.length, lastEnd + keepSilenceSamples);
      segments.push(samples.slice(lastEnd, end));
    }

    return segments;
  }

  async segment({ minSilenceLen, silenceThresh, keepSilence }, callbacks) {
    this.cancelled = false;
    const { onProgress, onStatus, onLog } = callbacks;
    const sampleRate = this.audioBuffer.sampleRate;

    onStatus('正在加载音频...');
    onProgress(5);

    const mono = this.mixToMono();
    const duration = mono.length / sampleRate;
    const frameSize = Math.floor(sampleRate * 0.01);

    onLog(`音频已加载: ${duration.toFixed(2)}秒, 采样率: ${sampleRate}Hz`);
    await yieldToMain();

    onStatus('正在分析音频波形...');
    onProgress(10);
    await yieldToMain();

    const frames = await this.analyzeFrames(mono, frameSize, onProgress);

    onStatus('正在检测静音...');
    onProgress(20);
    await yieldToMain();

    const silenceRuns = await this.findSilenceRuns(frames, frameSize, sampleRate, minSilenceLen, silenceThresh, mono.length, onProgress);

    onLog(`检测到 ${silenceRuns.length} 个静音段`);
    onProgress(25);

    if (this.cancelled) { onLog('已取消'); return []; }
    if (silenceRuns.length === 0) {
      onLog('未检测到足够的静音段，请尝试降低阈值或减小最小静音长度', 'warn');
    }

    const keepSilenceSamples = Math.floor(sampleRate * keepSilence / 1000);
    const rawSegments = this.extractSegments(mono, silenceRuns, keepSilenceSamples);

    onLog(`共 ${rawSegments.length} 个候选片段，正在编码...`);
    onProgress(30);
    await yieldToMain();

    const minSegSamples = sampleRate;
    const results = [];

    for (let i = 0; i < rawSegments.length; i++) {
      if (this.cancelled) { onLog('已取消'); return []; }

      if (rawSegments[i].length < minSegSamples) {
        onLog(`跳过短片段 ${i+1} (${(rawSegments[i].length / sampleRate).toFixed(2)}秒)`, 'warn');
        continue;
      }

      onStatus(`正在生成片段 ${i+1}/${rawSegments.length}...`);
      const pct = 30 + ((i + 1) / rawSegments.length) * 65;
      onProgress(Math.min(Math.round(pct), 99));
      await yieldToMain();

      const blob = await encodeWAV(rawSegments[i], sampleRate);
      const segDuration = rawSegments[i].length / sampleRate;
      const segName = `${this.baseName}_segment_${String(i+1).padStart(3, '0')}.wav`;

      results.push({
        index: i + 1,
        samples: rawSegments[i],
        sampleRate,
        duration: segDuration,
        blob,
        url: URL.createObjectURL(blob),
        name: segName,
        size: blob.size
      });

      onLog(`片段 ${i+1}: ${segName} (${segDuration.toFixed(2)}秒)`);
    }

    onProgress(100);
    onStatus(`完成！共 ${results.length} 个片段`);
    onLog(`处理完成，共生成 ${results.length} 个音频片段`, 'success');

    return results;
  }

  cancel() { this.cancelled = true; }
}

// ========================================================================
//  UI 逻辑
// ========================================================================

let segmenter = null;
let results = [];
let isProcessing = false;
let currentPlayAudio = null;
let currentPlayBtn = null;
let playbackContext = null;

function $(id) { return document.getElementById(id); }

// Init
document.addEventListener('DOMContentLoaded', () => {
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  $('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';

  setupUpload();
  setupParams();
});

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  $('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

// Upload
function setupUpload() {
  const zone = $('uploadZone');
  const input = $('fileInput');

  zone.addEventListener('click', () => input.click());

  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    zone.classList.add('dragover');
  });
  zone.addEventListener('dragleave', () => {
    zone.classList.remove('dragover');
  });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  input.addEventListener('change', () => {
    if (input.files.length) handleFile(input.files[0]);
  });
}

async function handleFile(file) {
  if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav|ogg|flac|m4a|aac|wma)$/i)) {
    addLog('不支持的文件格式', 'error');
    return;
  }

  // Clean up previous
  if (segmenter && segmenter.audioContext) {
    await segmenter.audioContext.close();
  }
  segmenter = null;
  results = [];
  clearResults();
  $('progressSection').classList.remove('show');
  $('resultsSection').classList.remove('show');

  const fi = $('fileInfo');
  fi.classList.add('show');
  $('fileName').textContent = file.name;
  $('fileSize').textContent = formatSize(file.size);
  $('fileDuration').textContent = '加载中...';

  // Decode
  try {
    segmenter = new AudioSegmenter();
    await segmenter.loadFile(file);
    const dur = segmenter.audioBuffer.duration;
    $('fileDuration').textContent = formatDuration(dur);

    $('paramsCard').classList.remove('hidden');
    $('controlsCard').classList.remove('hidden');
    $('startBtn').disabled = false;
    addLog(`已加载: ${file.name} (${formatDuration(dur)})`, 'success');
  } catch (err) {
    $('fileDuration').textContent = '加载失败';
    addLog(`加载失败: ${err.message}`, 'error');
    console.error(err);
  }
}

function removeFile() {
  $('fileInfo').classList.remove('show');
  $('paramsCard').classList.add('hidden');
  $('controlsCard').classList.add('hidden');
  $('progressSection').classList.remove('show');
  $('resultsSection').classList.remove('show');
  $('fileInput').value = '';
  clearLog();
  if (segmenter && segmenter.audioContext) segmenter.audioContext.close();
  segmenter = null;
  results = [];
  isProcessing = false;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m > 0 ? `${m}分${s}秒` : `${s}秒`;
}

function formatDurShort(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m > 0 ? `${m}:${String(s).padStart(2, '0')}` : `0:${String(s).padStart(2, '0')}`;
}

// Parameters
function setupParams() {
  ['minSilence', 'silenceThresh', 'keepSilence'].forEach(id => {
    const el = $(id);
    el.addEventListener('input', () => updateParam(id));
  });
}

function updateParam(id) {
  const el = $(id);
  const valEl = $(id + 'Val');
  if (id === 'minSilence') valEl.textContent = `${el.value} ms`;
  else if (id === 'silenceThresh') valEl.textContent = `${el.value} dB`;
  else if (id === 'keepSilence') valEl.textContent = `${el.value} ms`;
}

// Processing
async function startProcessing() {
  if (!segmenter || !segmenter.audioBuffer) return;
  if (isProcessing) return;

  isProcessing = true;
  $('startBtn').disabled = true;
  $('cancelBtn').disabled = false;
  clearResults();

  const ps = $('progressSection');
  ps.classList.add('show');
  $('resultsSection').classList.remove('show');
  $('progressFill').style.width = '0%';
  $('statusText').textContent = '准备就绪';
  clearLog();

  const params = {
    minSilenceLen: parseInt($('minSilence').value),
    silenceThresh: parseInt($('silenceThresh').value),
    keepSilence: parseInt($('keepSilence').value)
  };

  addLog(`参数: 静音长度=${params.minSilenceLen}ms, 阈值=${params.silenceThresh}dB, 保留静音=${params.keepSilence}ms`);

  try {
    results = await segmenter.segment(params, {
      onProgress: (pct) => { $('progressFill').style.width = pct + '%'; },
      onStatus: (msg) => { $('statusText').textContent = msg; },
      onLog: (msg, level) => { addLog(msg, level); }
    });

    showResults(results);
  } catch (err) {
    addLog(`处理出错: ${err.message}`, 'error');
    console.error(err);
  } finally {
    isProcessing = false;
    $('startBtn').disabled = false;
    $('cancelBtn').disabled = true;
  }
}

function cancelProcessing() {
  if (segmenter) segmenter.cancel();
  addLog('正在取消...', 'warn');
  $('cancelBtn').disabled = true;
}

// Log
function addLog(msg, level) {
  const box = $('logBox');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (level ? ' log-' + level : '');
  const time = new Date().toLocaleTimeString();
  entry.textContent = `[${time}] ${msg}`;
  box.appendChild(entry);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  $('logBox').innerHTML = '';
}

// Results
function showResults(segments) {
  if (!segments.length) {
    addLog('没有生成任何片段，请调整参数后重试', 'error');
    return;
  }

  const rs = $('resultsSection');
  rs.classList.add('show');

  $('resultsSummary').textContent = `共 ${segments.length} 个片段，总时长 ${formatDuration(segments.reduce((s, r) => s + r.duration, 0))}`;

  const list = $('resultsList');
  list.innerHTML = '';

  segments.forEach((seg, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = 'result-' + i;

    const idxDiv = document.createElement('div');
    idxDiv.className = 'index';
    idxDiv.textContent = i + 1;

    const waveWrap = document.createElement('div');
    waveWrap.className = 'waveform-wrap';
    const canvas = document.createElement('canvas');
    canvas.width = 240;
    canvas.height = 72;
    waveWrap.appendChild(canvas);

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `<div class="name">${seg.name}</div><div class="duration">${formatDurShort(seg.duration)} · ${formatSize(seg.size)}</div>`;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.innerHTML = '▶';
    playBtn.title = '播放';
    playBtn.dataset.index = i;
    playBtn.addEventListener('click', () => togglePlay(i, playBtn));

    const dlBtn = document.createElement('button');
    dlBtn.innerHTML = '⬇';
    dlBtn.title = '下载';
    dlBtn.addEventListener('click', () => downloadSegment(i));

    actions.appendChild(playBtn);
    actions.appendChild(dlBtn);

    card.appendChild(idxDiv);
    card.appendChild(waveWrap);
    card.appendChild(info);
    card.appendChild(actions);
    list.appendChild(card);

    // Draw waveform
    drawWaveform(canvas, seg.samples);
  });
}

function drawWaveform(canvas, samples) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const mid = h / 2;

  ctx.clearRect(0, 0, w, h);

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const waveColor = isDark ? '#0a84ff' : '#007aff';
  const bgColor = isDark ? '#3a3a3c' : '#f0f0f2';

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, w, h);

  const step = Math.max(1, Math.floor(samples.length / w));
  ctx.strokeStyle = waveColor;
  ctx.lineWidth = 1.5;
  ctx.beginPath();

  for (let x = 0; x < w; x++) {
    const idx = Math.min(Math.floor(x * step), samples.length - 1);
    const val = samples[idx];
    const y = mid + val * (mid - 4);
    ctx.moveTo(x, mid);
    ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Center line
  ctx.strokeStyle = isDark ? '#48484a' : '#d2d2d7';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();
}

function clearResults() {
  $('resultsList').innerHTML = '';
  $('resultsSection').classList.remove('show');
  stopPlay();
}

// Playback
function stopPlay() {
  if (currentPlayAudio) {
    try { currentPlayAudio.stop(); } catch(e) {}
    currentPlayAudio = null;
  }
  if (currentPlayBtn) {
    currentPlayBtn.innerHTML = '▶';
    currentPlayBtn.classList.remove('playing');
    currentPlayBtn = null;
  }
}

async function togglePlay(index, btn) {
  if (currentPlayBtn === btn) {
    stopPlay();
    return;
  }

  stopPlay();

  const seg = results[index];
  if (!seg) return;

  try {
    if (!playbackContext) playbackContext = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = playbackContext;

    if (ctx.state === 'suspended') await ctx.resume();
    const buffer = ctx.createBuffer(1, seg.samples.length, seg.sampleRate);
    buffer.getChannelData(0).set(seg.samples);
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start(0);
    source.onended = () => {
      if (currentPlayBtn === btn) {
        btn.innerHTML = '▶';
        btn.classList.remove('playing');
        currentPlayBtn = null;
        currentPlayAudio = null;
      }
    };

    currentPlayAudio = source;
    currentPlayBtn = btn;
    btn.innerHTML = '⏹';
    btn.classList.add('playing');
  } catch (err) {
    addLog('播放失败: ' + err.message, 'error');
  }
}

// Download
function downloadSegment(index) {
  const seg = results[index];
  if (!seg) return;
  const a = document.createElement('a');
  a.href = seg.url;
  a.download = seg.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function downloadAll() {
  if (!results.length) return;

  const files = [];
  for (const seg of results) {
    const data = await seg.blob.arrayBuffer();
    files.push({ name: seg.name, data });
  }

  const zip = generateZIP(files);
  const name = (segmenter ? segmenter.baseName : 'audio') + '_segments.zip';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zip);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 60000);

  addLog(`ZIP 包已下载: ${name} (${formatSize(zip.size)})`, 'success');
}
</script>
