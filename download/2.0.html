<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音频分割工具</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f2;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --border: #d2d2d7;
  --primary: #007aff;
  --primary-hover: #0062cc;
  --primary-light: #e8f0fe;
  --success: #34c759;
  --danger: #ff3b30;
  --danger-hover: #d62d20;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
}
[data-theme=dark] {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --surface2: #3a3a3c;
  --text: #f5f5f7;
  --text2: #a1a1a6;
  --border: #48484a;
  --primary: #0a84ff;
  --primary-hover: #409cff;
  --primary-light: #1c3a5e;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
  transition: background .3s, color .3s;
}

.container { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; }
.theme-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 50%;
  width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; transition: .2s; color: var(--text);
}
.theme-btn:hover { background: var(--border); }

.card {
  background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);
  transition: background .3s, border-color .3s;
  animation: fadeUp .35s ease-out both;
}

.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 48px 24px;
  text-align: center; cursor: pointer; transition: .25s; background: var(--surface2);
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--primary); background: var(--primary-light);
}
.upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
.upload-zone .text { font-size: 1.1rem; font-weight: 500; margin-bottom: 6px; }
.upload-zone .hint { font-size: .85rem; color: var(--text2); }
.upload-zone input[type=file] { display: none; }

.file-info { display: none; margin-top: 16px; padding: 12px 16px; background: var(--surface2);
  border-radius: var(--radius-sm); align-items: center; gap: 12px; }
.file-info.show { display: flex; animation: fadeUp .3s ease-out both; }
.file-info .name { flex: 1; font-weight: 500; word-break: break-all; }
.file-info .size, .file-info .duration { font-size: .85rem; color: var(--text2); white-space: nowrap; }
.file-info .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer;
  font-size: 1.2rem; padding: 4px; line-height: 1; }

.params-grid { display: grid; gap: 20px; }
.param-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.param-header label { font-weight: 500; font-size: .9rem; }
.param-header .value { font-size: .85rem; color: var(--primary); font-weight: 600;
  background: var(--primary-light); padding: 2px 10px; border-radius: 20px; }
.param input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none; height: 6px;
  background: var(--border); border-radius: 3px; outline: none;
  transition: background .2s;
}
.param input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary); cursor: pointer; border: 3px solid var(--surface);
  box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: .15s;
}
.param input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
.param input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%; background: var(--primary);
  cursor: pointer; border: 3px solid var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.param-desc { font-size: .78rem; color: var(--text2); margin-top: 4px; }

.param select {
  width: 100%; padding: 8px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: .9rem; cursor: pointer;
  transition: border-color .2s; outline: none;
}
.param select:hover, .param select:focus { border-color: var(--primary); }

.controls { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  padding: 12px 28px; border: none; border-radius: var(--radius-sm); font-size: 1rem;
  font-weight: 600; cursor: pointer; transition: .2s; display: inline-flex;
  align-items: center; gap: 8px;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: var(--danger-hover); transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover:not(:disabled) { background: var(--surface2); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }

.progress-section { display: none; }
.progress-section.show { display: block; animation: fadeUp .35s ease-out both; }
.progress-bar-wrap {
  width: 100%; height: 8px; background: var(--border); border-radius: 4px;
  overflow: hidden; margin-bottom: 12px;
}
.progress-bar-fill {
  height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 4px; transition: width .3s;
  background-size: 200% 100%;
}
.progress-bar-fill.active { animation: shimmer 1.5s linear infinite; }
.status-text { font-size: .9rem; color: var(--text2); margin-bottom: 8px; }
.status-text.pulse { animation: pulse 1.5s ease-in-out infinite; }
.log-box {
  background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 14px;
  max-height: 80px; overflow-y: auto; font-size: .82rem; font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
  line-height: 1.5; color: var(--text2);
}
.log-box .log-entry { animation: fadeIn .3s ease-out forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes pulse { 50% { opacity: .6; } }
.log-box .log-warn { color: #ff9500; }
.log-box .log-error { color: var(--danger); }
.log-box .log-success { color: var(--success); }

.results-section { display: none; }
.results-section.show { display: block; animation: fadeUp .35s ease-out both; }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.results-header h2 { font-size: 1.15rem; }
.results-summary { font-size: .85rem; color: var(--text2); }
.result-card {
  display: flex; gap: 8px 16px; padding: 16px; background: var(--surface2);
  border-radius: var(--radius-sm); margin-bottom: 10px; align-items: center;
  transition: .2s; border: 1px solid transparent; flex-wrap: wrap;
  animation: fadeUp .4s ease-out both;
}
.result-card:nth-child(1) { animation-delay: 0s; }
.result-card:nth-child(2) { animation-delay: .05s; }
.result-card:nth-child(3) { animation-delay: .1s; }
.result-card:nth-child(4) { animation-delay: .15s; }
.result-card:nth-child(5) { animation-delay: .2s; }
.result-card:nth-child(6) { animation-delay: .25s; }
.result-card:nth-child(7) { animation-delay: .3s; }
.result-card:nth-child(8) { animation-delay: .35s; }
.result-card:nth-child(9) { animation-delay: .4s; }
.result-card:nth-child(n+10) { animation-delay: .45s; }
.result-card:hover { border-color: var(--border); }
.result-card .index {
  width: 32px; height: 32px; border-radius: 50%; background: var(--primary);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85rem; flex-shrink: 0;
}
.result-card .info { flex: 1; min-width: 0; }
.result-card .info .name { font-weight: 500; font-size: .9rem; word-break: break-all; }
.result-card .info .duration { font-size: .78rem; color: var(--text2); margin-top: 2px; }
.result-card .actions { display: flex; gap: 6px; flex-shrink: 0; }
.result-card .actions button {
  width: 36px; height: 36px; border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
  transition: .15s; background: var(--surface); border: 1px solid var(--border); color: var(--text);
}
.result-card .actions button:hover { background: var(--primary); color: #fff; border-color: var(--primary); transform: scale(1.08); }
.result-card .actions button:active { transform: scale(.92); }
.result-card .actions button.play-btn.playing { background: var(--danger); color: #fff; border-color: var(--danger); }
.result-card .actions button.play-btn.playing:hover { transform: scale(1.08); }
.result-card .actions button:disabled { opacity: .3; cursor: default; }

.result-card .waveform-wrap { width: 120px; height: 36px; flex-shrink: 0; }
.result-card .waveform-wrap canvas { width: 100%; height: 100%; border-radius: 4px; display: block; }

.prog-row { display: flex; align-items: center; gap: 8px; width: 100%; order: 10; margin-top: 2px; }
.prog-bar {
  flex: 1; height: 8px; background: var(--border); border-radius: 4px;
  position: relative; min-width: 60px; cursor: pointer;
  transition: height .15s, background .15s;
}
.prog-bar:hover { height: 10px; background: var(--text2); }
.prog-bar .prog-fill {
  height: 100%; background: var(--primary); border-radius: 4px; width: 0%;
  pointer-events: none; transition: width .08s ease-out;
}
.prog-time { font-size: .72rem; color: var(--text2); font-variant-numeric: tabular-nums; min-width: 30px; }
.prog-cur { text-align: right; }
.prog-total { text-align: left; }

.download-all-wrap { margin-top: 16px; text-align: center; animation: fadeUp .4s ease-out .5s both; }

.footer { display: flex; justify-content: center; gap: 20px; padding: 24px 0 16px; border-top: 1px solid var(--border); margin-top: 8px; }
.footer a, .footer button { color: var(--text2); transition: color .2s; display: flex; align-items: center; gap: 4px; }
.footer a:hover, .footer button:hover { color: var(--text); }
.footer button { background: none; border: none; cursor: pointer; font-size: .85rem; font-family: inherit; padding: 0; }
.footer .version-badge { font-size: .75rem; color: var(--text2); opacity: .6; }

.main-row { display: flex; flex-direction: column; gap: 20px; }
@media (min-width: 768px) {
  .main-row { flex-direction: row; align-items: flex-start; }
  .main-row > .col-left, .main-row > .col-right { flex: 1; min-width: 0; }
}
.main-row + .progress-section { margin-top: 0; }



::view-transition-old(root) { animation: none; z-index: 1; }
::view-transition-new(root) {
  animation: circle-in .45s ease-out both;
  z-index: 2;
}
@keyframes circle-in {
  from { clip-path: circle(0% at var(--click-x, 50%) var(--click-y, 50%)); }
  to { clip-path: circle(150% at var(--click-x, 50%) var(--click-y, 50%)); }
}

.update-banner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 10px 16px; margin-bottom: 16px;
  background: var(--primary-light); border: 1px solid var(--primary);
  border-radius: var(--radius-sm); font-size: .85rem;
  animation: fadeUp .35s ease-out both;
}
.update-banner .update-info { flex: 1; }
.update-banner .update-info strong { color: var(--primary); }
.update-banner .update-info .update-date { color: var(--text2); font-size: .78rem; margin-top: 2px; }
.update-banner .update-link { color: var(--primary); text-decoration: none; font-weight: 500; white-space: nowrap; }
.update-banner .update-link:hover { text-decoration: underline; }
.update-banner .close-btn {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 1.2rem; line-height: 1; padding: 2px 6px; border-radius: 4px;
  transition: .15s;
}
.update-banner .close-btn:hover { background: var(--border); color: var(--text); }
.hidden { display: none !important; }

@media (max-width: 640px) {
  .container { padding: 16px 12px 40px; }
  .card { padding: 16px; }
  .result-card { flex-wrap: wrap; }
  .result-card .waveform-wrap { width: 100%; height: 40px; order: -1; }
  .result-card .actions { width: 100%; justify-content: flex-end; }
  .upload-zone { padding: 32px 16px; }
  .params-grid { gap: 16px; }
}
</style>
</head>
<body>

<div class="container">
<header>
  <h1>音频分割</h1>
  <button class="theme-btn" id="themeBtn" title="切换主题">☀️</button>
</header>
<div id="updateBanner" class="update-banner hidden"></div>

<div class="main-row">
  <div class="col-left">
    <div class="card">
      <div class="upload-zone" id="uploadZone">
        <div class="icon">🎵</div>
        <div class="text">点击或拖拽音频文件到此处</div>
        <div class="hint">支持 WAV · MP3 · OGG · FLAC · M4A</div>
        <input type="file" id="fileInput" accept="audio/*">
      </div>
      <div class="file-info" id="fileInfo">
        <span class="name" id="fileName"></span>
        <span class="size" id="fileSize"></span>
        <span class="duration" id="fileDuration"></span>
        <button class="remove-btn" id="removeBtn" title="移除文件">&times;</button>
      </div>
    </div>
  </div>
  <div class="col-right">
    <div class="card hidden" id="paramsCard">
      <div class="params-grid">
        <div class="param">
          <div class="param-header">
            <label for="minSilence">最小静音长度</label>
            <span class="value" id="minSilenceVal">3000 ms</span>
          </div>
          <input type="range" id="minSilence" min="200" max="5000" value="3000" step="100">
        </div>
        <div class="param">
          <div class="param-header">
            <label for="silenceThresh">静音阈值</label>
            <span class="value" id="silenceThreshVal">-40 dB</span>
          </div>
          <input type="range" id="silenceThresh" min="-70" max="-10" value="-40" step="1">
        </div>
        <div class="param">
          <div class="param-header">
            <label for="keepSilence">保留静音</label>
            <span class="value" id="keepSilenceVal">200 ms</span>
          </div>
          <input type="range" id="keepSilence" min="0" max="500" value="200" step="10">
        </div>

      </div>
    </div>

    <div class="card hidden" id="controlsCard">
      <div class="controls">
        <button class="btn btn-primary" id="startBtn">▶ 开始分割</button>
        <button class="btn btn-danger" id="cancelBtn" disabled>■ 取消</button>
      </div>
    </div>
  </div>
</div>

<div class="card progress-section" id="progressSection">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div style="text-align:right;font-size:.78rem;color:var(--text2);margin-top:4px" id="progressPct">0%</div>
  <div class="status-text" id="statusText">准备就绪</div>
  <div class="log-box" id="logBox"></div>
</div>

<div class="card results-section" id="resultsSection">
  <div class="results-header">
    <div>
      <h2>分割结果</h2>
      <div class="results-summary" id="resultsSummary"></div>
    </div>
    <label style="font-size:.82rem;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none">
      <input type="checkbox" id="waveToggle"> 波形图
    </label>
  </div>
  <div id="resultsList"></div>
  <div class="download-all-wrap" id="downloadAllWrap">
    <button class="btn btn-success" id="downloadAllBtn">📦 下载全部 (ZIP)</button>
  </div>
</div>

<footer class="footer">
  <a href="https://github.com/BCMOJANG/English-segmentation" target="_blank" rel="noopener" title="GitHub 仓库">
    <svg viewBox="0 0 16 16" height="20" width="20" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
  <a href="https://space.bilibili.com/1248933612" target="_blank" rel="noopener" title="Bilibili 空间">
    <svg viewBox="0 0 24 24" height="20" width="20" fill="currentColor"><path d="M7.172 2.757 10.414 6h3.171l3.243-3.242a1 1 0 011.415 1.415L16.414 6H18.5A3.5 3.5 0 0122 9.5v8a3.5 3.5 0 01-3.5 3.5h-13A3.5 3.5 0 012 17.5v-8A3.5 3.5 0 015.5 6h2.085L5.757 4.171a1 1 0 011.415-1.415zM18.5 8h-13a1.5 1.5 0 00-1.493 1.356L4 9.5v8a1.5 1.5 0 001.356 1.493L5.5 19h13a1.5 1.5 0 001.493-1.356L20 17.5v-8A1.5 1.5 0 0018.5 8zM8 11a1 1 0 011 1v2a1 1 0 01-2 0v-2a1 1 0 011-1zm8 0a1 1 0 011 1v2a1 1 0 01-2 0v-2a1 1 0 011-1z"/></svg>
  </a>
  <a href="https://qm.qq.com/q/GltIAFD6Am" target="_blank" rel="noopener" title="点击链接加入群聊【听力分割】">
    <svg viewBox="0 0 24 24" height="20" width="20" fill="currentColor"><path d="M19.913 14.529a31.977 31.977 0 00-.675-1.886l-.91-2.246c0-.026.012-.468.012-.696C18.34 5.86 16.507 2 12 2S5.66 5.86 5.66 9.7c0 .229.011.671.012.697l-.91 2.246a32.777 32.777 0 00-.675 1.886c-.86 2.737-.581 3.87-.369 3.895.455.054 1.771-2.06 1.771-2.06 0 1.224.637 2.822 2.016 3.976-.515.157-1.147.399-1.554.695-.365.267-.319.54-.253.65.289.481 4.955.307 6.303.157 1.347.15 6.014.324 6.302-.158.066-.11.112-.382-.253-.649-.407-.296-1.039-.538-1.555-.696 1.379-1.153 2.016-2.751 2.016-3.976 0 0 1.316 2.115 1.771 2.06.212-.025.49-1.157-.37-3.894"/></svg>
  </a>
  <button id="downloadHtmlBtn" title="保存为离线版本">
    <svg viewBox="0 0 24 24" height="20" width="20" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/><path d="M8 12l4 4 4-4-1.5-1.5L13 12.5V8h-2v4.5l-1.5-1.5L8 12z"/></svg>
    离线版
  </button>
  <span class="version-badge" id="versionBadge"></span>
</footer>

</div>

<script>

var worker = null;
var results = [];
var isProcessing = false;
var baseName = 'audio';
var playbackPositions = {};

var _showWaveforms = false;
var APP_VERSION_STR = 'v2.0';
var UPDATE_DISMISS_KEY = 'update_dismiss';
var UPDATE_INTERVAL = 7 * 24 * 60 * 60 * 1000;

var pb = {
  ctx: null, index: -1, source: null, startTime: 0, offset: 0,
  duration: 0, playing: false, paused: false, btn: null,
  progRow: null, progFill: null, progCur: null, progTotal: null, timerId: null
};

var dragState = {

function $(id) { return document.getElementById(id); }

function checkUpdate() {
  var dismissed = localStorage.getItem(UPDATE_DISMISS_KEY);
  if (dismissed && Date.now() - parseInt(dismissed, 10) < UPDATE_INTERVAL) return;
  fetch('https://bcmojang.github.io/English-segmentation/version.txt', { cache: 'no-cache' })
    .then(function(r) {
      if (!r.ok) throw new Error();
      return r.text();
    })
    .then(function(remoteVer) {
      remoteVer = remoteVer.trim().replace(/^version\s*=\s*/i, '').trim();
      if (remoteVer.replace(/^v/i, '') === APP_VERSION_STR.replace(/^v/i, '')) return;
      var banner = $('updateBanner');
      banner.innerHTML =
        '<div class="update-info"><strong>📢 有新版本可用</strong><div class="update-date">GitHub: ' + escHtml(remoteVer) + ' · 本地: ' + escHtml(APP_VERSION_STR) + '</div></div>' +
        '<button class="update-link" id="updateDownloadBtn">直接下载最新版 →</button>' +
        '<button class="close-btn" id="updateCloseBtn">&times;</button>';
      banner.classList.remove('hidden');
      $('updateDownloadBtn').addEventListener('click', function() {
        fetch('https://raw.githubusercontent.com/BCMOJANG/English-segmentation/main/index.html')
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(function() { URL.revokeObjectURL(url); }, 60000);
          });
      });
      $('updateCloseBtn').addEventListener('click', function() {
        banner.classList.add('hidden');
        localStorage.setItem(UPDATE_DISMISS_KEY, String(Date.now()));
      });
    })
    .catch(function() {});
}

function setProgress(pct) {
  $('progressFill').style.width = pct + '%';
  $('progressPct').textContent = Math.round(pct) + '%';
}

function initWorker() {
  if (worker) { try { worker.terminate(); } catch(e) {} worker = null; }
  try {
    var blob = new Blob([WORKER_CODE], { type: 'application/javascript' });
    worker = new Worker(URL.createObjectURL(blob));
    worker.onerror = function(e) {
      addLog('Worker 内部错误: ' + (e.message || '未知错误'), 'error');
      e.preventDefault();
      isProcessing = false;
      $('startBtn').disabled = false;
      $('cancelBtn').disabled = true;
      $('progressFill').classList.remove('active');
      $('statusText').classList.remove('pulse');
    };
    worker.onmessageerror = function() {
      addLog('Worker 消息传输失败（文件可能过大）', 'error');
    };
  } catch (e) {
    addLog('无法创建 Web Worker，请使用更新版本的浏览器', 'error');
  }
}

function getPreferredTheme() {
  var saved = localStorage.getItem('theme');
  if (saved) return saved;
  try {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    if (mq && mq.matches) return 'dark';
  } catch(e) {}
  return 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  $('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
  redrawWaveforms();
}

function setupTheme() {
  applyTheme(getPreferredTheme());

  // 监听系统主题变化（兼容 addListener / addEventListener）
  try {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    var mqHandler = function(e) {
      if (!localStorage.getItem('theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    };
    if (mq.addEventListener) {
      mq.addEventListener('change', mqHandler);
    } else if (mq.addListener) {
      mq.addListener(mqHandler);
    }
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  setupTheme();
  checkUpdate();
  $('versionBadge').textContent = APP_VERSION_STR;

  setupUpload();
  setupParams();
  $('themeBtn').addEventListener('click', function(e) { toggleTheme(e); });
  $('startBtn').addEventListener('click', startProcessing);
  $('cancelBtn').addEventListener('click', cancelProcessing);
  $('downloadAllBtn').addEventListener('click', downloadAll);
  $('downloadHtmlBtn').addEventListener('click', downloadHtmlPage);

  // 全局指针事件：用于进度条拖动
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
  document.addEventListener('pointercancel', onPointerUp);

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (results.length > 0) {
        var firstCard = document.querySelector('.result-card');
        if (firstCard) {
          var playBtn = firstCard.querySelector('.play-btn');
          if (playBtn) togglePlay(parseInt(playBtn.dataset.index), playBtn);
        }
      }
    }
    if (e.key === 'Escape') stopPlay();
    if (e.key === 'Enter' && !isProcessing && !$('startBtn').disabled) {
      startProcessing();
    }
  });
});

function toggleTheme(e) {
  var x = e.clientX, y = e.clientY;
  document.documentElement.style.setProperty('--click-x', x + 'px');
  document.documentElement.style.setProperty('--click-y', y + 'px');
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  try {
    if (document.startViewTransition) {
      document.startViewTransition(function() { applyTheme(next); });
    } else {
      applyTheme(next);
    }
  } catch(e) {
    applyTheme(next);
  }
}

function setupUpload() {
  var zone = $('uploadZone');
  var input = $('fileInput');

  zone.addEventListener('click', function() { input.click(); });

  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    zone.classList.add('dragover');
  });
  zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  input.addEventListener('change', function() {
    if (input.files.length) handleFile(input.files[0]);
  });

  $('removeBtn').addEventListener('click', removeFile);
}

function setupParams() {
  ['minSilence', 'silenceThresh', 'keepSilence'].forEach(function(id) {
    $(id).addEventListener('input', function() { updateParam(id); });
  });
}

function updateParam(id) {
  var el = $(id);
  var valEl = $(id + 'Val');
  if (id === 'minSilence') valEl.textContent = el.value + ' ms';
  else if (id === 'silenceThresh') valEl.textContent = el.value + ' dB';
  else if (id === 'keepSilence') valEl.textContent = el.value + ' ms';
}

function handleFile(file) {
  if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav|ogg|flac|m4a|aac|wma)$/i)) {
    addLog('不支持的文件格式', 'error');
    return;
  }

  if (file.size > 500 * 1024 * 1024) {
    addLog('文件超过500MB，建议使用桌面版处理', 'error');
    return;
  }

  stopPlay();
  cleanupPrevious();

  $('fileInfo').classList.add('show');
  $('fileName').textContent = file.name;
  $('fileSize').textContent = formatSize(file.size);
  $('fileDuration').textContent = formatSize(file.size);

  $('paramsCard').classList.remove('hidden');
  $('controlsCard').classList.remove('hidden');
  $('startBtn').disabled = false;

  window.__pendingFile = file;
  addLog('已选择: ' + file.name + ' (' + formatSize(file.size) + ')', 'success');
}

function mixToMono(buf) {
  var ch = buf.numberOfChannels;
  var len = buf.length;
  var mono = new Float32Array(len);
  if (ch === 1) {
    mono.set(buf.getChannelData(0));
  } else {
    var chData = [];
    for (var i = 0; i < ch; i++) chData.push(buf.getChannelData(i));
    var invCh = 1 / ch;
    for (var j = 0; j < len; j++) {
      var s = 0;
      for (var i = 0; i < ch; i++) s += chData[i][j];
      mono[j] = s * invCh;
    }
  }
  return mono;
}

function cleanupPrevious() {
  window.__pendingFile = null;
  results.forEach(function(r) { if (r.url) URL.revokeObjectURL(r.url); });
  results = [];
  playbackPositions = {};
  if (worker) { worker.terminate(); worker = null; }
  isProcessing = false;
  _waveformCanvases = [];
  $('progressFill').classList.remove('active');
  $('statusText').classList.remove('pulse');
  $('resultsList').innerHTML = '';
  $('resultsSection').classList.remove('show');
  $('progressSection').classList.remove('show');
  $('fileInput').value = '';
}

function removeFile() {
  stopPlay();
  cleanupPrevious();
  $('fileInfo').classList.remove('show');
  $('paramsCard').classList.add('hidden');
  $('controlsCard').classList.add('hidden');
  clearLog();
}

function startProcessing() {
  if (isProcessing) return;
  var file = window.__pendingFile;
  if (!file) {
    addLog('请先选择音频文件', 'error');
    return;
  }

  isProcessing = true;
  $('startBtn').disabled = true;
  $('cancelBtn').disabled = false;

  cleanupResults();

  $('progressSection').classList.add('show');
  $('resultsSection').classList.remove('show');
  setProgress(0);
  $('progressFill').classList.add('active');
  $('statusText').textContent = '正在读取文件...';
  $('statusText').classList.add('pulse');
  clearLog();
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  var params = {
    minSilenceLen: parseInt($('minSilence').value),
    silenceThresh: parseInt($('silenceThresh').value),
    keepSilence: parseInt($('keepSilence').value)
  };

  var startTime = Date.now();
  addLog('参数: 静音长度=' + params.minSilenceLen + 'ms, 阈值=' + params.silenceThresh + 'dB, 保留=' + params.keepSilence + 'ms');

  if (!worker) { initWorker(); if (!worker) { addLog('Worker 初始化失败', 'error'); resetProcessing(); return; } }

  var readPromise = typeof file.arrayBuffer === 'function'
    ? file.arrayBuffer()
    : new Promise(function(resolve, reject) {
        var r = new FileReader();
        r.onload = function(e) { resolve(e.target.result); };
        r.onerror = function(e) { reject(e.target.error || '读取失败'); };
        r.readAsArrayBuffer(file);
      });

  readPromise.then(function(buf) {
    $('statusText').textContent = '正在解码音频 (' + formatSize(buf.byteLength) + ')...';
    setProgress(2);

    // 解码模拟 2% → 65%，解码完成后再从当前位置平滑到 70%（混音）
    var _estSec = Math.max(0.5, buf.byteLength / (1024 * 1024) * 2.25);
    var _decT0 = Date.now();
    _decTimer = setInterval(function() {
      var pct = (Date.now() - _decT0) / 1000 / _estSec;
      if (pct >= 1) { setProgress(65); clearInterval(_decTimer); _decTimer = null; }
      else { setProgress(2 + pct * 63); }
    }, 100);

    if (!pb.ctx) pb.ctx = new (window.AudioContext || window.webkitAudioContext)();
    var ctx = pb.ctx;
    if (ctx.state === 'suspended') ctx.resume();

    try {
      ctx.decodeAudioData(buf, function(audioBuffer) {
        clearInterval(_decTimer);
        // 从当前进度平滑过渡到 70%（混音完成）
        var _mixFrom = parseFloat($('progressFill').style.width) || 2;

        var sampleRate = audioBuffer.sampleRate;
        baseName = file.name.replace(/\.[^/.]+$/, '');

        $('statusText').textContent = '正在混合声道...';

        // 分块混音：每块处理后让浏览器重绘，进度条同步跟进
        setTimeout(function() {
          var __ch = audioBuffer.numberOfChannels;
          var __len = audioBuffer.length;
          var __mono = new Float32Array(__len);
          var __cd = [];
          for (var __i = 0; __i < __ch; __i++) __cd.push(audioBuffer.getChannelData(__i));
          var __inv = 1 / __ch;
          var __pos = 0;
          var __step = Math.ceil(__len / 20); // 分 20 块

          function __mix() {
            var end = Math.min(__pos + __step, __len);
            for (var j = __pos; j < end; j++) {
              var s = 0;
              for (var i = 0; i < __ch; i++) s += __cd[i][j];
              __mono[j] = s * __inv;
            }
            __pos = end;
            setProgress(_mixFrom + (__pos / __len) * (70 - _mixFrom));

            if (__pos < __len) {
              setTimeout(__mix, 0);
            } else {
              // 混音完成，继续后续处理
              addLog('已加载: ' + file.name + ' (' + formatDuration(audioBuffer.length / sampleRate) + ')', 'success');

              var handler = function(e) {
                var msg = e.data;
                switch (msg.type) {
                  case 'progress':
                    setProgress(70 + (msg.pct || 0) * 0.3);
                    break;
                  case 'log':
                    addLog(msg.msg, msg.level);
                    break;
                  case 'complete':
                    worker.removeEventListener('message', handler);
                    setProgress(100);
                    var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                    isProcessing = false;
                    $('startBtn').disabled = false;
                    $('cancelBtn').disabled = true;
                    $('progressFill').classList.remove('active');
                    $('statusText').classList.remove('pulse');

                    var segs = msg.segments || [];
                    if (segs.length === 0) {
                      $('statusText').textContent = '未生成片段';
                      return;
                    }

                    results = segs.map(function(seg) {
                      var url = URL.createObjectURL(new Blob([seg.data], { type: 'audio/wav' }));
                      return {
                        index: seg.index, name: seg.name, duration: seg.duration, size: seg.size,
                        samples: new Float32Array(seg.samples), sampleRate: sampleRate,
                        data: seg.data, url: url, offset: 0
                      };
                    });

                    showResults(results);
                    $('statusText').textContent = '完成！共 ' + results.length + ' 个片段（耗时 ' + elapsed + ' 秒）';
                    addLog('实际耗时 ' + elapsed + ' 秒', 'success');
                    break;
                }
              };
              worker.addEventListener('message', handler);

              $('statusText').textContent = '正在处理...';
              worker.postMessage({ type: 'process', audioData: __mono.buffer, sampleRate: sampleRate, channels: 1, baseName: baseName, params: params }, [__mono.buffer]);
            }
          }
          __mix();
        }, 0);

      }, function(err) {
        clearInterval(_decTimer);
        resetProcessing();
        var msg = '解码失败，浏览器不支持此音频格式';
        if (err) { msg += ' (' + (err.message || err) + ')'; console.error('decodeAudioData error:', err); }
        msg += '。可尝试转换为 WAV 格式后重试';
        addLog(msg, 'error');
      });
    } catch (err) {
      clearInterval(_decTimer);
      resetProcessing();
      addLog('解码异常：' + (err.message || err), 'error');
    }
  }).catch(function(err) {
    resetProcessing();
    addLog('文件读取失败: ' + (err && err.message ? err.message : err), 'error');
  });
}

function resetProcessing() {
  if (_decTimer) { clearInterval(_decTimer); _decTimer = null; }
  isProcessing = false;
  $('startBtn').disabled = false;
  $('cancelBtn').disabled = true;
  $('progressFill').classList.remove('active');
  $('statusText').classList.remove('pulse');
}

function cancelProcessing() {
  if (worker) {
    worker.postMessage({ type: 'cancel' });
  }
  addLog('已取消', 'warn');
  resetProcessing();
}

function addLog(msg, level) {
  var box = $('logBox');
  var entry = document.createElement('div');
  entry.className = 'log-entry' + (level ? ' log-' + level : '');
  var time = new Date().toLocaleTimeString();
  entry.textContent = '[' + time + '] ' + msg;
  box.appendChild(entry);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  $('logBox').innerHTML = '';
}

function showResults(segments) {
  if (!segments.length) {
    addLog('没有生成任何片段，请调整参数后重试', 'error');
    return;
  }

  var rs = $('resultsSection');
  rs.classList.add('show');

  var totalDuration = 0;
  for (var i = 0; i < segments.length; i++) totalDuration += segments[i].duration;
  $('resultsSummary').textContent = '共 ' + segments.length + ' 个片段，总时长 ' + formatDuration(totalDuration);

  var list = $('resultsList');
  list.innerHTML = '';

  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    var card = document.createElement('div');
    card.className = 'result-card';
    card.id = 'result-' + i;

    var idxDiv = document.createElement('div');
    idxDiv.className = 'index';
    idxDiv.textContent = i + 1;

    var waveWrap = document.createElement('div');
    waveWrap.className = 'waveform-wrap';
    if (!_showWaveforms) waveWrap.style.display = 'none';
    var canvas = document.createElement('canvas');
    canvas.width = 240;
    canvas.height = 72;
    canvas._samples = seg.samples;
    waveWrap.appendChild(canvas);

    var info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = '<div class="name">' + escHtml(seg.name) + '</div><div class="duration">' + formatDurShort(seg.duration) + ' · ' + formatSize(seg.size) + '</div>';

    var actions = document.createElement('div');
    actions.className = 'actions';

    var playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.innerHTML = '▶';
    playBtn.dataset.index = i;
    playBtn.addEventListener('click', makePlayHandler(i, playBtn));

    var dlBtn = document.createElement('button');
    dlBtn.innerHTML = '⬇';
    dlBtn.addEventListener('click', makeDownloadHandler(i));

    actions.appendChild(playBtn);
    actions.appendChild(dlBtn);

    var progRow = document.createElement('div');
    progRow.className = 'prog-row';
    progRow.style.display = 'none';
    var timeCur = document.createElement('span');
    timeCur.className = 'prog-time prog-cur';
    timeCur.textContent = '0:00';
    var progBar = document.createElement('div');
    progBar.className = 'prog-bar';
    var progFill = document.createElement('div');
    progFill.className = 'prog-fill';
    progBar.appendChild(progFill);
    var timeTotal = document.createElement('span');
    timeTotal.className = 'prog-time prog-total';
    timeTotal.textContent = formatPlayTime(seg.duration);
    progRow.appendChild(timeCur);
    progRow.appendChild(progBar);
    progRow.appendChild(timeTotal);

    // 绑定进度条拖动事件
    (function(idx, bar, fill, cur) {
      bar.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        startDrag(idx, e, bar, fill, cur);
      });
    })(i, progBar, progFill, timeCur);

    card.appendChild(idxDiv);
    card.appendChild(waveWrap);
    card.appendChild(info);
    card.appendChild(actions);
    card.appendChild(progRow);
    list.appendChild(card);

    // 波形开关打开时才渲染
    if (_showWaveforms) {
      drawWaveform(canvas, seg.samples);
      registerWaveform(canvas, seg.samples);
    }
  }

  // 波形图开关
  var toggle = $('waveToggle');
  toggle.checked = _showWaveforms;
  toggle.onchange = function() {
    _showWaveforms = this.checked;
    var wraps = document.querySelectorAll('.waveform-wrap');
    if (_showWaveforms) {
      wraps.forEach(function(w) {
        w.style.display = '';
        var c = w.querySelector('canvas');
        if (c && c._samples) {
          drawWaveform(c, c._samples);
          registerWaveform(c, c._samples);
        }
      });
    } else {
      wraps.forEach(function(w) { w.style.display = 'none'; });
      _waveformCanvases = [];
    }
  };

  setTimeout(function() {
    var first = $('result-0');
    if (first) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 200);
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function makePlayHandler(i, btn) {
  return function() { togglePlay(i, btn); };
}

function makeDownloadHandler(i) {
  return function() { downloadSegment(i); };
}

// ============================================================
//  进度条拖动核心逻辑
// ============================================================

function startDrag(index, e, progBar, progFill, progCur) {
  var seg = results[index];
  if (!seg) return;

  var rect = progBar.getBoundingClientRect();
  var x = (e.clientX - rect.left) / rect.width;
  x = Math.max(0, Math.min(1, x));
  var newOffset = x * seg.duration;

  // 如果当前正在播放同一卡片，暂停播放
  if (pb.playing && pb.index === index) {
    dragState.wasPlaying = true;
    dragState.playBtn = pb.btn;
    if (pb.timerId) { clearInterval(pb.timerId); pb.timerId = null; }
    if (pb.source) { try { pb.source.stop(); } catch(e) {} pb.source = null; }
    pb.playing = false;
    pb.paused = true;
    if (pb.btn) {
      pb.btn.innerHTML = '▶';
      pb.btn.classList.remove('playing');
    }
  } else if (pb.playing) {
    stopPlay();
    dragState.wasPlaying = false;
  } else {
    dragState.wasPlaying = false;
  }

  // 更新进度显示
  progFill.style.width = (x * 100) + '%';
  progCur.textContent = formatPlayTime(newOffset);

  // 显示进度条行
  var progRow = progBar.parentElement;
  if (progRow) progRow.style.display = 'flex';

  // 缓存 DOM 引用和 rect，避免 onPointerMove 中重复查询
  dragState.progBar = progBar;
  dragState.progFill = progFill;
  dragState.progCur = progCur;
  dragState.barRect = rect;

  // 设置拖动状态
  dragState.active = true;
  dragState.cardIndex = index;
  dragState.offset = newOffset;
  dragState.duration = seg.duration;
  dragState.startX = e.clientX;
  dragState.startOffset = newOffset;

  playbackPositions[index] = newOffset;

  if (dragState.wasPlaying) {
    pb.offset = newOffset;
  }
}

function onPointerMove(e) {
  if (!dragState.active) return;
  var rect = dragState.barRect;
  var progFill = dragState.progFill;
  var progCur = dragState.progCur;
  if (!rect || !progFill || !progCur) return;

  var x = (e.clientX - rect.left) / rect.width;
  x = Math.max(0, Math.min(1, x));
  var newOffset = x * dragState.duration;

  progFill.style.width = (x * 100) + '%';
  progCur.textContent = formatPlayTime(newOffset);
  dragState.offset = newOffset;

  var index = dragState.cardIndex;
  playbackPositions[index] = newOffset;
  if (pb.index === index) {
    pb.offset = newOffset;
  }
}

function onPointerUp(e) {
  if (!dragState.active) return;

  var index = dragState.cardIndex;
  var newOffset = dragState.offset;
  dragState.progBar = dragState.progFill = dragState.progCur = null;
  dragState.barRect = null;

  // 如果之前正在播放，从新位置继续播放
  if (dragState.wasPlaying) {
    // 确保 pb.offset 是最新位置
    pb.offset = newOffset;
    // 如果播放按钮还存在，重新播放
    if (dragState.playBtn) {
      doPlay(index, dragState.playBtn);
    } else {
      // 降级：尝试找到播放按钮
      var card = document.getElementById('result-' + index);
      if (card) {
        var btn = card.querySelector('.play-btn');
        if (btn) doPlay(index, btn);
      }
    }
  }

  dragState.active = false;
  dragState.wasPlaying = false;
  dragState.playBtn = null;
}

// ============================================================
//  播放控制
// ============================================================

function doPlay(index, btn) {
  var seg = results[index];
  if (!seg) return false;
  try {
    if (!pb.ctx) pb.ctx = new (window.AudioContext || window.webkitAudioContext)();
    var ctx = pb.ctx;
    if (ctx.state === 'suspended') ctx.resume();

    var card = document.getElementById('result-' + index);
    if (!card) return false;

    // 从 playbackPositions 读取起始位置
    var offset = playbackPositions[index] || 0;
    if (offset >= seg.duration) {
      offset = 0;
      playbackPositions[index] = 0;
    }

    var buffer = ctx.createBuffer(1, seg.samples.length, seg.sampleRate);
    buffer.getChannelData(0).set(seg.samples);
    var source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);

    pb.source = source;
    pb.startTime = ctx.currentTime;
    pb.offset = offset;
    pb.duration = seg.duration;
    pb.playing = true;
    pb.paused = false;
    pb.index = index;
    pb.btn = btn;

    // 进度条 UI
    pb.progRow = card.querySelector('.prog-row');
    pb.progFill = card.querySelector('.prog-fill');
    pb.progCur = card.querySelector('.prog-cur');
    pb.progTotal = card.querySelector('.prog-total');
    if (pb.progRow) pb.progRow.style.display = 'flex';
    if (pb.progCur) pb.progCur.textContent = formatPlayTime(offset);
    if (pb.progTotal) pb.progTotal.textContent = formatPlayTime(seg.duration);

    btn.innerHTML = '⏸';
    btn.classList.add('playing');

    source.start(0, offset);

    if (pb.timerId) clearInterval(pb.timerId);
    pb.timerId = setInterval(function() {
      if (!pb.playing || pb.paused || !pb.source) return;
      var now = pb.offset + (ctx.currentTime - pb.startTime);
      if (now >= pb.duration) {
        clearInterval(pb.timerId); pb.timerId = null;
        // 播放结束，重置状态
        if (pb.progFill) pb.progFill.style.width = '100%';
        if (pb.progCur) pb.progCur.textContent = formatPlayTime(pb.duration);
        playbackPositions[pb.index] = pb.duration;
        pbReset();
        return;
      }
      if (pb.progFill) pb.progFill.style.width = ((now / pb.duration) * 100) + '%';
      if (pb.progCur) pb.progCur.textContent = formatPlayTime(now);
      playbackPositions[pb.index] = now;
    }, 100);

    source.onended = function() {
      if (pb.source === source) {
        clearInterval(pb.timerId); pb.timerId = null;
        if (pb.progFill) pb.progFill.style.width = '100%';
        if (pb.progCur) pb.progCur.textContent = formatPlayTime(pb.duration);
        playbackPositions[pb.index] = pb.duration;
        pbReset();
      }
    };

    return true;
  } catch (err) {
    addLog('播放失败: ' + err.message, 'error');
    return false;
  }
}

function togglePlay(index, btn) {
  var seg = results[index];
  if (!seg) return;

  if (pb.index === index && pb.btn === btn) {
    if (pb.playing && !pb.paused) {
      // 暂停
      if (pb.source) { try { pb.source.stop(); } catch(e) {} pb.source = null; }
      pb.offset += pb.ctx.currentTime - pb.startTime;
      pb.paused = true;
      if (pb.timerId) { clearInterval(pb.timerId); pb.timerId = null; }
      // 保存当前位置
      playbackPositions[index] = pb.offset;
      btn.innerHTML = '▶';
      btn.classList.remove('playing');
      return;
    } else if (pb.paused) {
      // 恢复播放
      doPlay(index, btn);
      return;
    }
  }

  stopPlay();
  doPlay(index, btn);
}

function stopPlay() {
  if (pb.timerId) { clearInterval(pb.timerId); pb.timerId = null; }
  if (pb.source) { try { pb.source.stop(); } catch(e) {} pb.source = null; }
  // 保存当前播放位置
  if (pb.index >= 0 && results[pb.index]) {
    playbackPositions[pb.index] = pb.offset;
  }
  if (pb.progRow) { pb.progRow.style.display = 'none'; pb.progRow = null; }
  if (pb.btn) { pb.btn.innerHTML = '▶'; pb.btn.classList.remove('playing'); pb.btn = null; }
  pb.playing = false;
  pb.paused = false;
  pb.offset = 0;
  pb.index = -1;
  pb.source = null;
  pb.progFill = null;
  pb.progCur = null;
  pb.progTotal = null;
}

function pbReset() {
  if (pb.timerId) { clearInterval(pb.timerId); pb.timerId = null; }
  if (pb.source) { try { pb.source.stop(); } catch(e) {} pb.source = null; }
  if (pb.progRow) { pb.progRow.style.display = 'none'; pb.progRow = null; }
  if (pb.btn) { pb.btn.innerHTML = '▶'; pb.btn.classList.remove('playing'); pb.btn = null; }
  pb.source = null;
  pb.btn = null;
  pb.progRow = null;
  pb.progFill = null;
  pb.progCur = null;
  pb.progTotal = null;
  pb.index = -1;
  pb.playing = false;
  pb.paused = false;
  pb.offset = 0;
}

function drawWaveform(canvas, samples) {
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var mid = h / 2;

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var waveColor = isDark ? '#0a84ff' : '#007aff';
  var bgColor = isDark ? '#3a3a3c' : '#e8e8ea';
  var centerColor = isDark ? '#48484a' : '#d2d2d7';

  var imageData = ctx.createImageData(w, h);
  var pixels = imageData.data;

  var bgR = parseInt(bgColor.slice(1,3), 16);
  var bgG = parseInt(bgColor.slice(3,5), 16);
  var bgB = parseInt(bgColor.slice(5,7), 16);

  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var idx = (y * w + x) * 4;
      pixels[idx] = bgR;
      pixels[idx+1] = bgG;
      pixels[idx+2] = bgB;
      pixels[idx+3] = 255;
    }
  }

  var waveR = parseInt(waveColor.slice(1,3), 16);
  var waveG = parseInt(waveColor.slice(3,5), 16);
  var waveB = parseInt(waveColor.slice(5,7), 16);

  var spp = samples.length / w;
  for (var x = 0; x < w; x++) {
    var start = Math.floor(x * spp);
    var end = Math.min(Math.floor((x + 1) * spp), samples.length);
    var min = 0, max = 0;
    for (var j = start; j < end; j++) {
      var v = samples[j];
      if (v < min) min = v;
      if (v > max) max = v;
    }
    var top = Math.round(mid + min * (mid - 4));
    var bottom = Math.round(mid + max * (mid - 4));
    for (var y = top; y <= bottom; y++) {
      var idx = (y * w + x) * 4;
      pixels[idx] = waveR;
      pixels[idx+1] = waveG;
      pixels[idx+2] = waveB;
      pixels[idx+3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);

  ctx.strokeStyle = centerColor;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();
}

var _waveformCanvases = [];

function registerWaveform(canvas, samples) {
  _waveformCanvases.push({ canvas: canvas, samples: samples });
}

function redrawWaveforms() {
  for (var i = 0; i < _waveformCanvases.length; i++) {
    drawWaveform(_waveformCanvases[i].canvas, _waveformCanvases[i].samples);
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function formatDuration(sec) {
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m > 0 ? m + '分' + s + '秒' : s + '秒';
}

function formatDurShort(sec) {
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m > 0 ? m + ':' + String(s).padStart(2, '0') : '0:' + String(s).padStart(2, '0');
}

function formatPlayTime(sec) {
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

function cleanupResults() {
  for (var i = 0; i < results.length; i++) {
    if (results[i].url) URL.revokeObjectURL(results[i].url);
  }
  _waveformCanvases = [];
  $('resultsList').innerHTML = '';
  $('resultsSection').classList.remove('show');
  stopPlay();
}

function downloadSegment(index) {
  var seg = results[index];
  if (!seg) return;
  var a = document.createElement('a');
  a.href = seg.url;
  a.download = seg.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function downloadAll() {
  if (!results.length) return;

  try {
    var files = [];
    for (var i = 0; i < results.length; i++) {
      files.push({ name: results[i].name, data: results[i].data });
    }

    if (worker) {
      var handler = function(e) {
        if (e.data.type === 'zipdone') {
          var zipData = e.data.zipData;
          downloadBlob(zipData, baseName + '_segments.zip');
          worker.removeEventListener('message', handler);
        }
      };
      worker.addEventListener('message', handler);
      worker.postMessage({ type: 'zip', files: files });
    }
  } catch (err) {
    addLog('下载失败: ' + err.message, 'error');
    console.error(err);
  }
}

function downloadHtmlPage() {
  var doctype = '<!DOCTYPE html>\n';
  var html = doctype + document.documentElement.outerHTML;
  var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '音频分割工具.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function() { URL.revokeObjectURL(url); }, 60000);
  addLog('离线版已下载', 'success');
}

function downloadBlob(data, filename) {
  var blob = new Blob([data], { type: 'application/zip' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 60000);
  addLog('ZIP 包已下载: ' + filename + ' (' + formatSize(blob.size) + ')', 'success');
}
</script>
